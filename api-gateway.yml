
server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: 
                  - "http://localhost:*"
                  - "http://127.0.0.1:*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
      routes:
        - id: auth
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: kyc
          uri: lb://auth-service
          predicates:
            - Path=/api/kyc/**

        - id: auth-admin
          uri: lb://auth-service
          predicates:
            - Path=/api/admin/users/**,/api/admin/kyc/**

        - id: policy-admin
          uri: lb://policy-service
          predicates:
            - Path=/api/admin/policies/**

        - id: auth-docs
          uri: lb://auth-service
          predicates:
            - Path=/auth/v3/api-docs/**,/auth/swagger-ui/**,/auth/webjars/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /${segment}

        - id: policy
          uri: lb://policy-service
          predicates:
            - Path=/api/policies/**

        - id: policy-docs
          uri: lb://policy-service
          predicates:
            - Path=/policy/v3/api-docs/**
          filters:
            - RewritePath=/policy/(?<segment>.*), /${segment}

        - id: claims
          uri: lb://claims-service
          predicates:
            - Path=/api/claims/**

        - id: claims-docs
          uri: lb://claims-service
          predicates:
            - Path=/claims/v3/api-docs/**
          filters:
            - RewritePath=/claims/(?<segment>.*), /${segment}
        - id: admin
          uri: lb://admin-service
          predicates:
            - Path=/api/dashboard/**

        - id: admin-docs
          uri: lb://admin-service
          predicates:
            - Path=/admin/v3/api-docs/**
          filters:
            - RewritePath=/admin/(?<segment>.*), /${segment}

  application:
    name: api-gateway

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: Policy Service
        url: /policy/v3/api-docs
      - name: Claims Service
        url: /claims/v3/api-docs
      - name: Admin Service
        url: /admin/v3/api-docs

eureka:
  instance:
    hostname: 127.0.0.1
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka/

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:900000}
spring.cloud:
  openfeign:
    circuitbreaker:
      enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        sliding-window-type: COUNT_BASED
    instances:
      auth-service:
        base-config: default
      POLICY-SERVICE:
        base-config: default
      CLAIMS-SERVICE:
        base-config: default

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: b3
  observations:
    key-values:
      application: ${spring.application.name}
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
